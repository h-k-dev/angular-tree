<mat-toolbar class="app-toolbar">
  <nav class="app-nav" aria-label="Pages">
    <a
      class="app-nav-link"
      routerLink="/"
      routerLinkActive="app-nav-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Playground</a
    >
    <a
      class="app-nav-link"
      routerLink="/api"
      routerLinkActive="app-nav-link--active"
      >API</a
    >
  </nav>

  <span class="app-spacer"></span>

  <button
    matIconButton
    (click)="toggleTheme()"
    [attr.aria-label]="
      theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
    "
  >
    <mat-icon>{{ theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<main class="app-main">
  <router-outlet />
</main>
