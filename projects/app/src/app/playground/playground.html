<aside class="playground-aside" aria-label="Examples">
  <nav class="playground-aside-nav">
    @for (example of examples; track example.path) {
      <a
        class="playground-aside-link"
        [routerLink]="example.path"
        routerLinkActive="playground-aside-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon>{{ example.icon }}</mat-icon>
        <span class="playground-aside-label">{{ example.label }}</span>
      </a>
    }
  </nav>
</aside>

<section class="playground-content">
  <router-outlet />
</section>
