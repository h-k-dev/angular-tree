<h2 mat-dialog-title>Rename &ldquo;{{ data.name }}&rdquo;</h2>

<form (submit)="submit($event)">
  <mat-dialog-content>
    <mat-form-field class="rename-field" appearance="outline">
      <mat-label>New name</mat-label>
      <input matInput autocomplete="off" [value]="name()" (input)="onInput($event)" (focus)="onFocus($event)" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="undefined">Cancel</button>
    <button matButton="filled" type="submit" [disabled]="!name().trim()">Rename</button>
  </mat-dialog-actions>
</form>
