<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>App</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- Material SYMBOLS, not classic Material Icons: the demo uses Symbols-only
         ligatures (draft, progress_activity, folder_managed) which the classic
         font renders as literal text. MAT_ICON_DEFAULT_OPTIONS points MatIcon
         at this font set (app.config.ts). Loaded NON-blocking (media swap on
         load): a slow or unreachable fonts CDN must never stall first paint —
         it showed up as e2e timing flakes. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
  </head>
  <body app-root></body>
</html>
